<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siftle</title>
    <link rel="icon" type="image/png" href="./assets/Siftle_logo-removebg-preview.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=Inter:wght@500;650;750;850&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="brief-board" aria-label="Siftle trending news website">
        <header class="site-header">
          <div class="brand-lockup">
            <img src="./assets/Siftle_logo-removebg-preview.png" alt="Siftle logo" />
            <span>Siftle</span>
          </div>

          

          <button class="menu-button" id="menuButton" type="button" aria-label="Open menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <button class="top-saved" type="button" data-menu-action="saved">Saved</button>
        </header>

        

        <section class="brief-hero">
          <div class="headline-row">
            <h1>Top News</h1>
            <p class="date-label" id="dateLabel"></p>
            
          </div>
          
        </section>

        <section class="archive-controls" id="archiveControls" aria-label="Daily archive selector">
          <label for="archiveDateSelect">Day</label>
          <select id="archiveDateSelect" aria-label="Select saved day">
            <option value="">Today</option>
          </select>
          <button type="button" id="todayButton">Live feed</button>
          <span id="archiveStatus" aria-live="polite"></span>
        </section>

        <nav class="category-tabs" id="categoryTabs" aria-label="News categories"></nav>

        <section class="story-list" id="storyList" aria-label="Trending stories"></section>
        <section class="story-detail" id="storyDetail" aria-label="Story summary" hidden></section>
      </section>
    </main>

    <script type="module" src="./dist/main.js"></script>
  </body>
</html>

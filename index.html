<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Siftle</title>
    <link rel="icon" type="image/png" href="./assets/siftle-logo-small.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem("siftle_theme");
          document.documentElement.dataset.theme = savedTheme === "light" ? "light" : "dark";
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="./src/styles.css?v=15" />
  </head>
  <body>
    <main class="app-shell">
      <section class="brief-board" aria-label="Siftle trending news website">
        <header class="site-header">
          <div class="brand-lockup">
            <img src="./assets/siftle-logo-small.png" alt="Siftle logo" />
            <span>Siftle<span style="color: #3b82f6;">.</span></span>
          </div>

          <div class="top-compact-controls">
            <button class="header-icon-button desktop-header-nav top-news active" type="button" data-surface="feed" aria-label="News" title="News">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5h12.5A2.5 2.5 0 0 1 19 8v10.5H6.5A2.5 2.5 0 0 1 4 16V5.5Z"/><path d="M19 9h1a1 1 0 0 1 1 1v6a2.5 2.5 0 0 1-2.5 2.5"/><path d="M7.5 9h7M7.5 12h7M7.5 15h4"/></svg>
            </button>
            <button class="header-icon-button desktop-header-nav top-markets" type="button" data-surface="markets" aria-label="Markets" title="Markets">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V9m5 10V5m5 14v-7m5 7V3"/></svg>
            </button>
            <button class="header-icon-button desktop-header-nav top-portfolio" type="button" data-surface="portfolio" aria-label="Portfolio" title="Portfolio">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 8.5h14v10.25A2.25 2.25 0 0 1 16.75 21h-9.5A2.25 2.25 0 0 1 5 18.75V8.5Z"/><path d="M8.5 8.5V6.75A3.75 3.75 0 0 1 12.25 3h.5a3.75 3.75 0 0 1 3.75 3.75V8.5"/><path d="M8.5 13h7M8.5 16h4"/></svg>
            </button>
            <button class="header-icon-button desktop-header-nav top-saved" type="button" data-menu-action="saved" aria-label="Saved" title="Saved">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 4.5h11v16L12 17l-5.5 3.5v-16Z"/></svg>
            </button>
            <button class="header-icon-button theme-toggle-button" id="themeToggleButton" type="button" data-theme-toggle aria-label="Switch to light mode" title="Switch to light mode">
              <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v2M12 19.5v2M4.57 4.57l1.42 1.42M18.01 18.01l1.42 1.42M2.5 12h2M19.5 12h2M4.57 19.43l1.42-1.42M18.01 5.99l1.42-1.42"/></svg>
              <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.5A7.75 7.75 0 0 1 9.5 3.5 8.5 8.5 0 1 0 20.5 14.5Z"/></svg>
            </button>
            <button class="wallet-button" id="walletButton" type="button" aria-label="Sign in" title="Sign in">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5.5 6.5h11.25A2.75 2.75 0 0 1 19.5 9.25v7.25A2.5 2.5 0 0 1 17 19H6.5A2.5 2.5 0 0 1 4 16.5v-8A2 2 0 0 1 6 6.5h10"/><path d="M15.5 11h5v4h-5a2 2 0 0 1 0-4Z"/><path d="M17.25 13h.01"/></svg>
              <span class="wallet-button-label">Sign in</span>
              <span class="wallet-status-dot" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        

        <section class="brief-hero">
          <div class="headline-row">
            <h1>Top News</h1>
            <p class="date-label" id="dateLabel"></p>
            
          </div>
          
        </section>

        <section class="archive-controls" id="archiveControls" aria-label="Daily archive selector">
          <select id="archiveDateSelect" aria-label="Select saved day">
            <option value="">Today</option>
          </select>
          <span id="archiveStatus" aria-live="polite"></span>
        </section>

        <nav class="category-tabs" id="categoryTabs" aria-label="News categories"></nav>

        <section class="story-list" id="storyList" aria-label="Trending stories"></section>

        <section class="story-detail" id="storyDetail" aria-label="Story summary" hidden></section>
      </section>
    </main>

    <nav class="mobile-bottom-nav" aria-label="Primary navigation">
      <button type="button" class="active" data-bottom-nav="markets">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V9m5 10V5m5 14v-7m5 7V3"/></svg>
        <span>Markets</span>
      </button>
      <button type="button" data-bottom-nav="feed">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2z"/><path d="M16 11h3m-3 4h3M7 8h5M7 12h5M7 16h3"/></svg>
        <span>News</span>
      </button>
      <button type="button" data-bottom-nav="portfolio">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8.5h16v10H4z"/><path d="M8 8.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2.5M4 13h16"/></svg>
        <span>Portfolio</span>
      </button>
      <button type="button" data-bottom-nav="leaderboard">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34M12 2a7 7 0 0 0-7 7c0 3 2.5 5.5 6 6h2c3.5-.5 6-3 6-6a7 7 0 0 0-7-7z"/></svg>
        <span>Leaderboard</span>
      </button>
    </nav>

    <script>
      window.process = { env: { NODE_ENV: "production" } };
      window.global = window;
    </script>
    <script src="./dist/client-config.js"></script>
    <script type="module" src="./dist/main.js?v=16"></script>
  </body>
</html>

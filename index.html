<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siftle</title>
    <link rel="icon" type="image/png" href="./assets/Siftle_logo-removebg-preview.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Comic+Relief:wght@400;700&family=Inter:wght@500;650;750;850&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="brief-board" aria-label="Siftle trending news website">
        <header class="site-header">
          <div class="brand-lockup">
            <img src="./assets/Siftle_logo-removebg-preview.png" alt="Siftle logo" />
            <span>Siftle</span>
          </div>

          <div class="top-compact-controls">
            <button class="header-icon-button desktop-header-nav top-news active" type="button" data-surface="feed" aria-label="News" title="News">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5h12.5A2.5 2.5 0 0 1 19 8v10.5H6.5A2.5 2.5 0 0 1 4 16V5.5Z"/><path d="M19 9h1a1 1 0 0 1 1 1v6a2.5 2.5 0 0 1-2.5 2.5"/><path d="M7.5 9h7M7.5 12h7M7.5 15h4"/></svg>
            </button>
            <button class="header-icon-button desktop-header-nav top-markets" type="button" data-surface="markets" aria-label="Markets" title="Markets">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V9m5 10V5m5 14v-7m5 7V3"/></svg>
            </button>
            <button class="header-icon-button desktop-header-nav top-saved" type="button" data-menu-action="saved" aria-label="Saved" title="Saved">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 4.5h11v16L12 17l-5.5 3.5v-16Z"/></svg>
            </button>
            <button id="archivePill" class="header-icon-button archive-pill" type="button" aria-label="Open archive" title="Archive">
              <span class="calendar-symbol" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M6.5 4.75h11A2.75 2.75 0 0 1 20.25 7.5v10A2.75 2.75 0 0 1 17.5 20.25h-11A2.75 2.75 0 0 1 3.75 17.5v-10A2.75 2.75 0 0 1 6.5 4.75Z"/><path d="M8 3.75v3m8-3v3M4 9h16"/><path d="M8.25 13h2.5v2.5h-2.5zM13.25 13h2.5v2.5h-2.5z"/></svg>
              </span>
            </button>
            <button class="wallet-button" id="walletButton" type="button" aria-label="Connect wallet" title="Connect wallet">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5.5 6.5h11.25A2.75 2.75 0 0 1 19.5 9.25v7.25A2.5 2.5 0 0 1 17 19H6.5A2.5 2.5 0 0 1 4 16.5v-8A2 2 0 0 1 6 6.5h10"/><path d="M15.5 11h5v4h-5a2 2 0 0 1 0-4Z"/><path d="M17.25 13h.01"/></svg>
              <span class="wallet-button-label">Connect wallet</span>
              <span class="wallet-status-dot" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        

        <section class="brief-hero">
          <div class="headline-row">
            <h1>Top News</h1>
            <p class="date-label" id="dateLabel"></p>
            
          </div>
          
        </section>

        <section class="archive-controls" id="archiveControls" aria-label="Daily archive selector">
          <select id="archiveDateSelect" aria-label="Select saved day">
            <option value="">Today</option>
          </select>
          <span id="archiveStatus" aria-live="polite"></span>
        </section>

        <nav class="category-tabs" id="categoryTabs" aria-label="News categories"></nav>

        <section class="story-list" id="storyList" aria-label="Trending stories"></section>

        <section class="story-detail" id="storyDetail" aria-label="Story summary" hidden></section>
      </section>
    </main>

    <nav class="mobile-bottom-nav" aria-label="Primary navigation">
      <button type="button" class="active" data-bottom-nav="feed">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5h12.5A2.5 2.5 0 0 1 19 8v10.5H6.5A2.5 2.5 0 0 1 4 16V5.5Z"/><path d="M19 9h1a1 1 0 0 1 1 1v6a2.5 2.5 0 0 1-2.5 2.5"/><path d="M7.5 9h7M7.5 12h7M7.5 15h4"/></svg>
        <span>News</span>
      </button>
      <button type="button" data-bottom-nav="markets">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V9m5 10V5m5 14v-7m5 7V3"/></svg>
        <span>Markets</span>
      </button>
      <button type="button" data-bottom-nav="portfolio">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8.5h16v10H4z"/><path d="M8 8.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2.5M4 13h16"/></svg>
        <span>Portfolio</span>
      </button>
      <button type="button" data-bottom-nav="saved">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 4.5h11v16L12 17l-5.5 3.5v-16Z"/></svg>
        <span>Saved</span>
      </button>
    </nav>

    <script src="./dist/client-config.js"></script>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>

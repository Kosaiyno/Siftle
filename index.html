<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siftle</title>
    <link rel="icon" type="image/png" href="./assets/Siftle_logo-removebg-preview.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Comic+Relief:wght@400;700&family=Inter:wght@500;650;750;850&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="brief-board" aria-label="Siftle trending news website">
        <header class="site-header">
          <div class="brand-lockup">
            <img src="./assets/Siftle_logo-removebg-preview.png" alt="Siftle logo" />
            <span>Siftle</span>
          </div>

          

          <div class="top-compact-controls">
            <button class="top-saved" type="button" data-menu-action="saved">Saved</button>
            <button id="archivePill" class="archive-pill" type="button" aria-label="Open archive">Archive</button>
          </div>
        </header>

        

        <section class="brief-hero">
          <div class="headline-row">
            <h1>Top News</h1>
            <p class="date-label" id="dateLabel"></p>
            
          </div>
          
        </section>

        <section class="archive-controls" id="archiveControls" aria-label="Daily archive selector">
          <label for="archiveDateSelect">Day</label>
          <select id="archiveDateSelect" aria-label="Select saved day">
            <option value="">Today</option>
          </select>
          <button type="button" id="todayButton">Live feed</button>
          <span id="archiveStatus" aria-live="polite"></span>
        </section>

        <nav class="category-tabs" id="categoryTabs" aria-label="News categories"></nav>

        <section class="story-list" id="storyList" aria-label="Trending stories"></section>

        <button class="mobile-archive-card mobile-only" id="mobileArchiveCard" type="button" aria-label="Browse archive">
          <div class="mobile-archive-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="mobile-archive-text">
            <strong>Archive</strong>
            <span>Explore what was trending on any day.</span>
          </div>
          <div class="mobile-archive-chevron" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </button>

        <section class="story-detail" id="storyDetail" aria-label="Story summary" hidden></section>
      </section>
    </main>

    <script src="./dist/client-config.js"></script>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
